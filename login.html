<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>VFMS Login</title>
<style>
:root{--bg:#070b12;--panel:#101826;--line:#28415f;--text:#edf4ff;--muted:#9fb0c5;--gold:#d7ae52;--blue:#4aa8ff}
*{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at top right,#12304c,transparent 35%),var(--bg);color:var(--text);font-family:system-ui,sans-serif}
.card{width:min(440px,100%);padding:26px;border:1px solid #ffffff18;border-radius:22px;background:var(--panel);box-shadow:0 25px 70px #0008}
.mark{width:58px;height:58px;display:grid;place-items:center;border-radius:18px;background:linear-gradient(145deg,var(--gold),#76551d);color:#08101b;font-weight:900}
h1{margin:18px 0 5px}.muted{color:var(--muted);line-height:1.5}label{display:block;margin:15px 0 6px;color:var(--muted);font-size:.84rem}
input{width:100%;padding:12px;border:1px solid #ffffff20;border-radius:11px;background:#090f19;color:var(--text)}
button{width:100%;padding:12px;margin-top:18px;border:1px solid var(--blue);border-radius:11px;background:linear-gradient(135deg,#2f8de6,#17589e);color:white;font-weight:800;cursor:pointer}
.secondary{background:transparent;border-color:#ffffff25}.message{min-height:24px;margin-top:14px;color:#ffd081;font-size:.9rem}
</style>
</head>
<body>
<main class="card">
<div class="mark">VF</div>
<h1>Vanguard Fleet Access</h1>
<p class="muted">Sign in to your VFMS personnel portal. New accounts require a valid email address.</p>
<form id="loginForm">
<label>Email</label><input name="email" type="email" required autocomplete="email">
<label>Password</label><input name="password" type="password" required minlength="8" autocomplete="current-password">
<button type="submit">Sign In</button>
</form>
<button class="secondary" id="signupBtn">Create Account</button>
<div class="message" id="message"></div>
</main>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js";
const supabase=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const msg=document.getElementById("message");
const values=()=>Object.fromEntries(new FormData(document.getElementById("loginForm")).entries());
document.getElementById("loginForm").addEventListener("submit",async e=>{
 e.preventDefault(); msg.textContent="Signing in...";
 const {email,password}=values();
 const {error}=await supabase.auth.signInWithPassword({email,password});
 if(error){msg.textContent=error.message;return}
 location.href="./portal.html";
});
document.getElementById("signupBtn").addEventListener("click",async()=>{
 const {email,password}=values();
 if(!email||!password){msg.textContent="Enter an email and password first.";return}
 msg.textContent="Creating account...";
 const {error}=await supabase.auth.signUp({email,password,options:{data:{display_name:email.split("@")[0]}}});
 msg.textContent=error?error.message:"Account created. Check your email if confirmation is enabled.";
});
const {data:{session}}=await supabase.auth.getSession();
if(session) location.href="./portal.html";
</script>
</body></html>
